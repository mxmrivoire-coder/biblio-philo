{% extends "base.html" %}
{% block title %}Nouveau — Problématiques — Bibliothécaire philo{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="/problems" class="text-stone-400 hover:text-stone-600 text-sm">← Retour</a>
    <h1 class="text-2xl font-bold text-stone-900">Nouvelle problématique</h1>
  </div>

  <form action="/problems" method="post"
        class="bg-white rounded-xl shadow-sm border border-stone-200 p-6 space-y-5">

    <div>
      <label for="title" class="block text-sm font-medium text-stone-700 mb-1">
        Titre <span class="text-red-500">*</span>
      </label>
      <input type="text" id="title" name="title" required
             class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"
             placeholder="Ex. : Travail, absurde et domination">
    </div>

    <div>
      <label for="theme" class="block text-sm font-medium text-stone-700 mb-1">
        Thème <span class="text-red-500">*</span>
      </label>
      <input type="text" id="theme" name="theme" required
             class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"
             placeholder="Ex. : méritocratie et violence symbolique">
    </div>

    <div>
      <label class="block text-sm font-medium text-stone-700 mb-2">Auteurs de référence</label>
      <div class="grid grid-cols-2 sm:grid-cols-3 gap-2">
        {% for author in predefined_authors %}
        <label class="flex items-center gap-2 text-sm cursor-pointer">
          <input type="checkbox" name="authors" value="{{ author }}"
                 class="rounded border-stone-300 text-amber-600 focus:ring-amber-500">
          <span>{{ author }}</span>
        </label>
        {% endfor %}
      </div>
    </div>

    <div>
      <label for="extra_author" class="block text-sm font-medium text-stone-700 mb-1">
        Autre auteur (libre)
      </label>
      <input type="text" id="extra_author" name="extra_author"
             class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"
             placeholder="Nom d'un auteur non listé…">
    </div>

    <div>
      <label class="block text-sm font-medium text-stone-700 mb-2">Orientation</label>
      <div class="flex gap-4">
        {% for value, label in orientations %}
        <label class="flex items-center gap-2 text-sm cursor-pointer">
          <input type="radio" name="orientation" value="{{ value }}"
                 {% if value == 'essai' %}checked{% endif %}
                 class="border-stone-300 text-amber-600 focus:ring-amber-500">
          <span>{{ label }}</span>
        </label>
        {% endfor %}
      </div>
    </div>

    <div class="pt-2 flex gap-3">
      <button type="submit"
              class="bg-amber-600 hover:bg-amber-700 text-white px-5 py-2.5 rounded-lg text-sm font-medium transition-colors">
        ✦ Générer les problématiques
      </button>
      <a href="/problems"
         class="px-5 py-2.5 rounded-lg text-sm font-medium border border-stone-300 hover:bg-stone-100 transition-colors">
        Annuler
      </a>
    </div>

  </form>
</div>
{% endblock %}
