{% extends "base.html" %}
{% block title %}Erreur — Bibliothécaire philo{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
  <h1 class="text-2xl font-bold text-red-700 mb-4">Erreur serveur</h1>

  <div class="bg-red-50 border border-red-300 rounded-xl p-5 mb-4">
    <p class="font-semibold text-red-800 text-sm">{{ error }}</p>
  </div>

  {% if error_detail %}
  <details open class="bg-stone-100 border border-stone-300 rounded-xl p-4">
    <summary class="cursor-pointer text-sm font-medium text-stone-700 mb-2">Détail technique</summary>
    <pre class="mt-3 text-xs text-stone-700 overflow-auto whitespace-pre-wrap leading-relaxed">{{ error_detail }}</pre>
  </details>
  {% endif %}

  <div class="mt-6">
    <a href="/books" class="text-amber-600 hover:text-amber-800 text-sm font-medium">← Retour à la bibliothèque</a>
  </div>
</div>
{% endblock %}
