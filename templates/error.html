{% extends "base.html" %}
{% block title %}Erreur — Bibliothécaire philo{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <h1 class="font-serif text-3xl text-ink font-semibold mb-6">Erreur serveur</h1>

  <div class="bg-red-50 border border-red-200 rounded-xl p-5 mb-4">
    <p class="font-semibold text-red-800 text-sm">{{ error }}</p>
  </div>

  {% if error_detail %}
  <details open class="bg-white border border-cream-dark rounded-xl p-5">
    <summary class="cursor-pointer text-sm font-medium text-ink-muted hover:text-ink mb-3">Détail technique</summary>
    <pre class="mt-3 text-xs text-ink-muted overflow-auto whitespace-pre-wrap leading-relaxed">{{ error_detail }}</pre>
  </details>
  {% endif %}

  <div class="mt-6">
    <a href="/books" class="text-sm font-medium text-bordeaux hover:text-bordeaux-dark">← Retour à la bibliothèque</a>
  </div>
</div>
{% endblock %}
