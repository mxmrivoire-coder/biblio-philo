{% extends "base.html" %}
{% block title %}Modifier — {{ book.title }} — Bibliothécaire philo{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
  <a href="/books/{{ book.id }}" class="text-xs text-ink-muted hover:text-bordeaux inline-flex items-center gap-1 mb-5">← Retour</a>
  <h1 class="font-serif text-3xl text-ink font-semibold mb-7">Modifier le livre</h1>

  <form action="/books/{{ book.id }}/edit" method="post"
        class="bg-white rounded-xl border border-cream-dark shadow-sm p-6 space-y-5">

    <div>
      <label for="title" class="block text-xs font-semibold uppercase tracking-widest text-ink-muted mb-2">
        Titre <span class="text-bordeaux normal-case tracking-normal font-normal">*</span>
      </label>
      <input type="text" id="title" name="title" required
             value="{{ book.title }}"
             class="w-full border border-cream-dark bg-ivory rounded-lg px-4 py-2.5 text-sm text-ink focus:outline-none focus:ring-2 focus:ring-bordeaux/30 focus:border-bordeaux">
    </div>

    <div>
      <label for="author" class="block text-xs font-semibold uppercase tracking-widest text-ink-muted mb-2">
        Auteur <span class="text-bordeaux normal-case tracking-normal font-normal">*</span>
      </label>
      <input type="text" id="author" name="author" required
             value="{{ book.author }}"
             class="w-full border border-cream-dark bg-ivory rounded-lg px-4 py-2.5 text-sm text-ink focus:outline-none focus:ring-2 focus:ring-bordeaux/30 focus:border-bordeaux">
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label for="type" class="block text-xs font-semibold uppercase tracking-widest text-ink-muted mb-2">Type</label>
        <select id="type" name="type"
                class="w-full border border-cream-dark bg-ivory rounded-lg px-3 py-2.5 text-sm text-ink focus:outline-none focus:ring-2 focus:ring-bordeaux/30">
          {% for value, label in book_types %}
          <option value="{{ value }}" {% if book.type == value %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label for="status" class="block text-xs font-semibold uppercase tracking-widest text-ink-muted mb-2">Statut</label>
        <select id="status" name="status"
                class="w-full border border-cream-dark bg-ivory rounded-lg px-3 py-2.5 text-sm text-ink focus:outline-none focus:ring-2 focus:ring-bordeaux/30">
          {% for value, label in book_statuses %}
          <option value="{{ value }}" {% if book.status == value %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="pt-2 flex gap-3">
      <button type="submit"
              class="bg-bordeaux hover:bg-bordeaux-dark text-ivory px-5 py-2.5 rounded-lg text-sm font-medium shadow-sm">
        Enregistrer
      </button>
      <a href="/books/{{ book.id }}"
         class="px-5 py-2.5 rounded-lg text-sm font-medium border border-cream-dark hover:bg-cream text-ink-muted hover:text-ink">
        Annuler
      </a>
    </div>
  </form>
</div>
{% endblock %}
